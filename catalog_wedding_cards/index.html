<body class="text-on-surface font-body-md">

<!-- Main Content Area -->

<!-- Paper/Finish -->

<label class="block font-label-caps text-label-caps text-outline mb-xs">Paper Finish</label>
<div class="space-y-xs">

<input class="rounded text-primary border-outline-variant focus:ring-primary h-4 w-4" type="checkbox"/>
<span>Matte Texture</span>

<label class="flex items-center gap-2 text-body-sm cursor-pointer hover:text-primary">
<input class="rounded text-primary border-outline-variant focus:ring-primary h-4 w-4" type="checkbox"/>
<span>Glossy Finish</span>
</label>
<label class="flex items-center gap-2 text-body-sm cursor-pointer hover:text-primary">
<input class="rounded text-primary border-outline-variant focus:ring-primary h-4 w-4" type="checkbox"/>
<span>Gold Foil Embossed</span>
</label>
<label class="flex items-center gap-2 text-body-sm cursor-pointer hover:text-primary">
<input class="rounded text-primary border-outline-variant focus:ring-primary h-4 w-4" type="checkbox"/>
<span>Velvet Soft Touch</span>
</label>
</div>
</div>
<!-- GSM/Thickness -->
<div class="mb-md">
<label class="block font-label-caps text-label-caps text-outline mb-xs">GSM / Thickness</label>
<div class="grid grid-cols-2 gap-xs" id="gsm-filters">
<button onclick="toggleFilter('gsm', 250, this)" class="filter-btn-gsm bg-surface-container-low border border-outline-variant/30 text-body-sm py-2 rounded-lg hover:border-primary hover:text-primary transition-all font-medium">250 GSM</button>
<button onclick="toggleFilter('gsm', 300, this)" class="filter-btn-gsm bg-surface-container-low border border-outline-variant/30 text-body-sm py-2 rounded-lg hover:border-primary hover:text-primary transition-all font-medium">300 GSM</button>
<button onclick="toggleFilter('gsm', 350, this)" class="filter-btn-gsm bg-surface-container-low border border-outline-variant/30 text-body-sm py-2 rounded-lg hover:border-primary hover:text-primary transition-all font-medium">350 GSM</button>
<button onclick="toggleFilter('gsm', 400, this)" class="filter-btn-gsm bg-surface-container-low border border-outline-variant/30 text-body-sm py-2 rounded-lg hover:border-primary hover:text-primary transition-all font-medium">400 GSM</button>
</div>
</div>
<!-- Language -->
<div>
<label class="block font-label-caps text-label-caps text-outline mb-xs">Language Support</label>
<div class="flex flex-wrap gap-xs" id="lang-filters">
<span onclick="toggleFilter('lang', 'Hindi', this)" class="filter-btn-lang px-3 py-1 bg-secondary-container text-on-secondary-container rounded-full text-label-caps font-medium cursor-pointer hover:bg-primary/20 transition-all">Hindi</span>
<span onclick="toggleFilter('lang', 'English', this)" class="filter-btn-lang px-3 py-1 bg-secondary-container text-on-secondary-container rounded-full text-label-caps font-medium cursor-pointer hover:bg-primary/20 transition-all">English</span>
</div>
</div>
</div>
<!-- Ad/Promotion Spot -->
<div class="relative rounded-lg overflow-hidden h-48 group shadow-raised">
<div class="absolute inset-0 bg-gradient-to-t from-primary/80 to-transparent z-10"></div>
<div class="absolute bottom-sm left-sm right-sm z-20 text-on-primary">
<p class="font-h3 text-body-md leading-tight mb-xs">Need Bulk Quotes?</p>
<a href="../about/index.html#contact" class="inline-block text-label-caps font-bold bg-white text-primary px-3 py-1.5 rounded-full hover:scale-105 transition-transform">Contact Us</a>
</div>
<div class="w-full h-full bg-cover bg-center transition-transform duration-700 group-hover:scale-110" data-alt="A professional close-up of high-quality industrial printing machinery operating in a bright, modern facility in Uttar Pradesh. The image showcases sleek metal surfaces, vibrant blue ink accents, and precision engineering. The lighting is crisp and cool, reflecting a high-end corporate modern environment dedicated to smart efficiency and reliability." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDW3hSnTd12m6L0WFc7gdm45zxWNCrCjLEoFfOIBscnIxNWVnw80M0avuKxTs9TiPyzIYQwbtoYazpYXfoLAJ38h8klMawrQk3QVPFvrPYKVP128AVLEqpgIKjHEx-HCEk8x5ewq2p2Z_cQpnfLGKv8dx68KNtQTuKI5th4B8jHU91OqIWxrv6awenKVZSVFAIftkXl3Y9D3z6hZfcrRo4TfwqYuzfGULDKakL1HAY_NVpx5LCAzF-wo7PmXD0nDz3xo480dR86L9c5')"></div>
</div>
</aside>
<!-- Product Grid Section -->
<div class="flex-grow">
<!-- Sort & Result Summary -->
<div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-md gap-sm">
<div>
<h1 class="font-h2 text-h2 text-on-surface">Wedding Cards</h1>
<p class="text-on-surface-variant text-body-sm">Showing 12 premium designs for your big day</p>
</div>
<div class="flex items-center gap-xs">
<span class="text-label-caps text-outline uppercase">Sort By:</span>
<div class="flex bg-surface-container-low p-1 rounded-lg border border-outline-variant/30">
<button class="px-4 py-1.5 bg-surface-container-lowest rounded-lg shadow-sm text-body-sm font-medium text-primary">Newest</button>
<button class="px-4 py-1.5 text-body-sm font-medium text-on-surface-variant hover:text-on-surface transition-colors">Most Booked</button>
</div>
</div>
</div>
<!-- Grid -->
<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-md" id="catalog-grid">
<!-- Populated by JS -->
</div>
<!-- Pagination / Load More -->
<div class="mt-xl flex flex-col items-center gap-md">
<button class="px-xl py-4 bg-primary text-on-primary font-bold text-body-md rounded-lg shadow-raised hover:scale-[1.02] active:scale-95 transition-all flex items-center gap-sm">
                        Load More Designs
                        <span class="material-symbols-outlined">expand_more</span>
</button>
<p class="text-label-caps text-outline uppercase tracking-widest">Page 1 of 3</p>
</div>
</div>
</div>
</main>
<div id="footer-mount"></div>
<div id="fab-mount"></div>

<script>
    document.getElementById('header-mount').innerHTML = renderHeader('catalog', '../');
    document.getElementById('footer-mount').innerHTML = renderFooter('../');
    document.getElementById('fab-mount').innerHTML = renderWhatsAppFAB();

    // Filter State
    let activeFilters = {
        lang: null,
        gsm: null
    };

    function toggleFilter(type, value, el) {
        const isCurrentlyActive = activeFilters[type] === value;
        
        // Reset styles for all siblings in the same filter group
        const container = el.parentElement;
        Array.from(container.children).forEach(child => {
            if (type === 'lang') {
                child.classList.remove('bg-primary', 'text-on-primary');
                child.classList.add('bg-secondary-container', 'text-on-secondary-container');
            } else if (type === 'gsm') {
                child.classList.remove('bg-primary', 'text-on-primary', 'border-primary');
                child.classList.add('bg-surface-container-low', 'border-outline-variant/30', 'text-body-sm');
            }
        });

        if (isCurrentlyActive) {
            // Deselect
            activeFilters[type] = null;
        } else {
            // Select
            activeFilters[type] = value;
            if (type === 'lang') {
                el.classList.remove('bg-secondary-container', 'text-on-secondary-container');
                el.classList.add('bg-primary', 'text-on-primary');
            } else if (type === 'gsm') {
                el.classList.remove('bg-surface-container-low', 'border-outline-variant/30');
                el.classList.add('bg-primary', 'text-on-primary', 'border-primary');
            }
        }
        renderCatalogGrid();
    }

    function renderCatalogGrid() {
        const grid = document.getElementById('catalog-grid');
        let catalog = JRData.getCatalog();
        
        // Apply filters
        if (activeFilters.gsm) {
            catalog = catalog.filter(c => c.gsm && c.gsm.toString() === activeFilters.gsm.toString());
        }
        if (activeFilters.lang) {
            if (activeFilters.lang === 'Hindi') {
                // Assuming items with Hindi name support Hindi language
                catalog = catalog.filter(c => c.name_hi && c.name_hi.trim() !== '');
            } else if (activeFilters.lang === 'English') {
                catalog = catalog.filter(c => c.name_en && c.name_en.trim() !== '');
            }
        }
        
        if (catalog.length === 0) {
            grid.innerHTML = '<p class="col-span-full py-xl text-center text-on-surface-variant text-body-lg">No designs found matching your selected filters.</p>';
            return;
        }

        grid.innerHTML = catalog.map(d => `
        <div class="bg-surface-container-lowest rounded-lg shadow-raised border border-outline-variant/20 overflow-hidden flex flex-col group transition-all duration-300">
            <div class="relative h-64 overflow-hidden">
                <div class="w-full h-full bg-cover bg-center transition-transform duration-500 group-hover:scale-105" style="background-image: url('${d.image}')"></div>
                <div class="absolute top-2 right-2">
                    <span class="bg-primary/10 text-primary text-[10px] px-2 py-1 rounded font-bold uppercase backdrop-blur-sm">${d.category || 'New'}</span>
                </div>
            </div>
            <div class="p-sm flex-grow flex flex-col">
                <div class="flex justify-between items-start mb-xs">
                    <h3 class="font-h3 text-body-md text-on-surface leading-tight" data-en="${d.name_en}" data-hi="${d.name_hi || d.name_en}">${d.name_en}</h3>
                    <span class="bg-secondary-container/50 text-on-secondary-container text-[10px] px-2 py-0.5 rounded-full font-bold">${d.gsm || 300} GSM</span>
                </div>
                <p class="text-on-surface-variant text-body-sm mb-md line-clamp-2">${d.finish || 'Premium Finish'}</p>
                <button onclick="window.location.href='../design_detail_wedding_card/index.html?id=${d.id}'" class="mt-auto w-full py-3 border border-primary text-primary font-bold text-body-sm rounded-lg hover:bg-primary hover:text-on-primary transition-all active:scale-95">View Details</button>
            </div>
        </div>
        `).join('');

        // Apply translations to the newly rendered grid if needed
        applyLanguage(JRData.getLanguage());
    }

    // Initial render
    renderCatalogGrid();

    // Micro-interactions for buttons
    document.querySelectorAll('button:not(.filter-btn-gsm)').forEach(button => {
        button.addEventListener('mousedown', () => {
            button.classList.add('scale-95');
        });
        button.addEventListener('mouseup', () => {
            button.classList.remove('scale-95');
        });
    });

    applyLanguage(JRData.getLanguage());
</script>
</body>
</html>
