<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JR Printiq | Admin Portal Login</title>
    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../shared/design-tokens.js"></script>
    <script src="../shared/components.js"></script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { background-color: #F7F9FC; }
        .hero-gradient { background: linear-gradient(135deg, #3B7DE8 0%, #0B2F9E 100%); }
        .card-shadow { box-shadow: 0 4px 12px rgba(11,47,107,0.05); }
    </style>
</head>
<body class="font-body-md text-on-surface min-h-screen flex flex-col justify-between">
    <!-- Header -->
    <header class="bg-primary-container shadow-sm fixed top-0 w-full z-50">
        <div class="flex justify-between items-center w-full px-gutter max-w-max_width mx-auto h-16">
            <a href="../home_page/index.html" class="flex items-center gap-2 no-underline">
                <span class="text-h3 font-h1-mobile font-bold text-on-primary">JR Printiq</span>
            </a>
            <span class="text-on-primary font-bold text-label-caps tracking-widest border border-on-primary/20 px-3 py-1 rounded-full bg-white/10">ADMIN PORTAL</span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="pt-24 pb-xl flex-grow flex items-center justify-center px-gutter">
        <div class="w-full max-w-md bg-surface-container-lowest border border-outline-variant/30 rounded-xl card-shadow p-lg">
            <div class="text-center mb-lg">
                <div class="w-16 h-16 mx-auto bg-primary/10 rounded-full flex items-center justify-center mb-sm">
                    <span class="material-symbols-outlined text-primary" style="font-size:32px">admin_panel_settings</span>
                </div>
                <h1 class="text-h2 font-h2 mb-xs">Sign In</h1>
                <p class="text-body-sm text-on-surface-variant">Access the JR Printiq administrative dashboard</p>
            </div>

            <!-- Login Form -->
            <form onsubmit="handleLogin(event)" class="space-y-md">
                <div>
                    <label class="block text-body-sm text-on-surface-variant mb-xs font-semibold">Username</label>
                    <div class="relative">
                        <span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">person</span>
                        <input type="text" id="username" placeholder="Enter username" required
                            class="w-full h-12 pl-11 pr-md border border-outline-variant rounded-[10px] focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none transition-all">
                    </div>
                </div>
                <div>
                    <label class="block text-body-sm text-on-surface-variant mb-xs font-semibold">Password</label>
                    <div class="relative">
                        <span class="absolute left-md top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">lock</span>
                        <input type="password" id="password" placeholder="Enter password" required
                            class="w-full h-12 pl-11 pr-md border border-outline-variant rounded-[10px] focus:border-primary focus:ring-2 focus:ring-primary/20 focus:outline-none transition-all">
                    </div>
                </div>

                <!-- Error message -->
                <div id="login-error" class="hidden bg-[#C0392B]/10 border border-[#C0392B]/20 text-[#C0392B] rounded-lg p-sm text-center text-body-sm font-semibold">
                    Invalid username or password
                </div>

                <button type="submit" class="w-full h-12 bg-primary text-on-primary font-bold rounded-[10px] shadow-md hover:bg-primary/90 transition-all active:scale-95 flex items-center justify-center gap-sm">
                    <span class="material-symbols-outlined">login</span>
                    Sign In to Dashboard
                </button>
            </form>

            <div class="mt-lg p-sm bg-primary/5 rounded-lg border border-primary/10">
                <p class="text-body-sm text-primary font-medium text-center">
                    <span class="material-symbols-outlined align-middle mr-1" style="font-size:14px">info</span>
                    Demo Credentials: <strong>admin</strong> / <strong>admin123</strong>
                </p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-primary-container text-on-primary-container/60 py-md border-t border-on-primary/10">
        <div class="max-w-max_width mx-auto px-gutter flex justify-between items-center">
            <span class="text-label-caps">© 2026 JR Printiq Admin</span>
            <a href="../home_page/index.html" class="text-on-primary-container/80 text-body-sm hover:underline flex items-center gap-xs">
                Back to Site <span class="material-symbols-outlined" style="font-size:14px">arrow_forward</span>
            </a>
        </div>
    </footer>

    <script>
        // Check if already logged in
        const auth = JRData.getAuth();
        if (auth.loggedIn) {
            window.location.href = 'dashboard.html';
        }

        function handleLogin(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value.trim();

            const loggedInUser = JRData.login(user, pass);
            if (loggedInUser) {
                window.location.href = 'dashboard.html';
            } else {
                document.getElementById('login-error').classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
